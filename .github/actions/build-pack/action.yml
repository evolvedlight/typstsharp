name: Build Typst.Net package
description: Builds and packs the Typst.Net Nuget package including native dependencies
inputs:
  dotnet-version:
    description: .NET SDK version to install
    default: 10.x
  rust-version:
    description: Rust toolchain version to install
    default: 1.91.1
  package-version:
    description: Optional package version override
    required: false
  output-directory:
    description: Output directory for packed artifacts
    default: artifacts
runs:
  using: composite
  steps:
    - name: Install .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Install build prerequisites
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          libssl-dev \
          llvm \
          clang \
          zlib1g-dev \
          mingw-w64 \
          ca-certificates \
          musl-tools

    - name: Configure Musl Linker
      shell: bash
      run: |
        if [ ! -f /usr/local/bin/x86_64-linux-musl-gcc ]; then
          sudo ln -s $(which musl-gcc) /usr/local/bin/x86_64-linux-musl-gcc
        fi

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: ${{ inputs.rust-version }}
        cache-workspaces: src/typst_core
        rust-src-dir: src/typst_core

    - name: Add Rust cross-compilation targets
      shell: bash
      run: rustup target add x86_64-pc-windows-gnu x86_64-unknown-linux-musl

    - name: Restore .NET solution
      shell: bash
      run: dotnet restore typstsharp.slnx

    - name: Pack typstsharp
      shell: bash
      env:
        CC_x86_64_unknown_linux_musl: x86_64-linux-musl-gcc
        CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: x86_64-linux-musl-gcc
      run: |
        set -euo pipefail
        mkdir -p "${{ inputs.output-directory }}"
        version_arg=""
        if [ -n "${{ inputs.package-version }}" ]; then
          version_arg="/p:Version=${{ inputs.package-version }}"
        fi
        dotnet pack src/typstsharp/typstsharp.csproj -c Release -o "${{ inputs.output-directory }}" $version_arg
